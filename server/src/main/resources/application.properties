spring.config.import=optional:file:.env[.properties],optional:file:server/.env[.properties]
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# Banco de dados - Supabase (PostgreSQL)
# =============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:none}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.jakarta.persistence.query.timeout=${JPA_QUERY_TIMEOUT_MS:15000}

# =============================================
# Servidor
# =============================================
spring.application.name=spring-boot-essentials
server.port=${SERVER_PORT:8080}

# =============================================
# Connection pool
# =============================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preferQueryMode=simple
spring.datasource.hikari.data-source-properties.connectTimeout=10
spring.datasource.hikari.data-source-properties.socketTimeout=20
spring.datasource.hikari.data-source-properties.tcpKeepAlive=true

# =============================================
# Manutencao local
# =============================================
app.schema-migration.enabled=${APP_SCHEMA_MIGRATION_ENABLED:false}
spring.transaction.default-timeout=${TRANSACTION_TIMEOUT_SECONDS:20}
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
